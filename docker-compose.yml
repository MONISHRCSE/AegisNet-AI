networks:
  aegis-api-tier:
    driver: bridge
  aegis-data-tier:
    driver: bridge
    internal: true
  aegis-honeynet:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  zeek_logs:
  ml_models:

services:

  # ─── Databases ─────────────────────────────────────────────
  aegis-postgres:
    image: postgres:15-alpine
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegis-data-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  aegis-mongodb:
    image: mongo:6.0
    container_name: aegis-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - aegis-data-tier
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  aegis-redis:
    image: redis:7-alpine
    container_name: aegis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aegis-data-tier
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── FastAPI Application ────────────────────────────────────
  aegis-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-api
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_DIR: /app/ml_models
    volumes:
      - ml_models:/app/ml_models
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/migrate.py:/app/migrate.py
    networks:
      - aegis-api-tier
      - aegis-data-tier
    depends_on:
      aegis-postgres:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy
      aegis-redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── ML Inference Consumer ─────────────────────────────────
  aegis-ml-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: aegis-ml-consumer
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_DIR: /app/ml_models
    command: python -m app.ml.consumer
    volumes:
      - ml_models:/app/ml_models
      - ./backend/app:/app/app
    networks:
      - aegis-data-tier
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy

  # ─── Telemetry Ingestion Worker ─────────────────────────────
  aegis-telemetry-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: aegis-telemetry-worker
    restart: unless-stopped
    env_file: .env
    environment:
      ZEEK_LOG_PATH: /var/log/zeek/current/conn.log
    command: python -m app.telemetry.run_worker
    volumes:
      - zeek_logs:/var/log/zeek
      - ./backend/app:/app/app
    networks:
      - aegis-data-tier
    depends_on:
      aegis-redis:
        condition: service_healthy
      aegis-mongodb:
        condition: service_healthy

  # ─── Network Monitoring ─────────────────────────────────────
  aegis-zeek:
    build:
      context: ./zeek
      dockerfile: Dockerfile
    container_name: aegis-zeek
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - zeek_logs:/var/log/zeek
      - ./zeek/site:/usr/local/zeek/share/zeek/site
    environment:
      ZEEK_INTERFACE: ${MONITOR_INTERFACE:-eth0}
      REDIS_URL: ${REDIS_URL}

  # ─── Reverse Proxy ──────────────────────────────────────────
  aegis-nginx:
    image: nginx:1.25-alpine
    container_name: aegis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - aegis-api-tier
    depends_on:
      aegis-api:
        condition: service_healthy
